<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Kaayu Studio Manager</title>
  <link rel="icon" type="image/png" href="{{ root_path }}/static/img/icon.png" />

  <script src="{{ root_path }}/static/js/tailwind.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'] },
          colors: {
            desert:   '#B17457',
            milk:     '#FBF9F3',
            charcoal: '#2E2E2E',
            stone:    '#D8D2D2',
          }
        }
      }
    }
  </script>

  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    .login-wrap {
      display: flex;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FBF9F3;
    }

    /* ── Left: image panel ── */
    .login-image-panel {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: none; /* hidden on mobile */
    }
    @media (min-width: 768px) {
      .login-image-panel { display: block; }
    }

    .login-image-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* dark gradient overlay */
    .login-image-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(46,46,46,0.55) 0%,
        rgba(46,46,46,0.25) 60%,
        rgba(177,116,87,0.15) 100%
      );
    }

    /* tagline on image */
    .image-tagline {
      position: absolute;
      bottom: 40px;
      left: 40px;
      right: 40px;
      z-index: 2;
      color: rgba(255,255,255,0.85);
    }
    .image-tagline .tag-main {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.4;
    }
    .image-tagline .tag-sub {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-top: 8px;
    }

    /* ── Right: form panel ── */
    .login-form-panel {
      width: 100%;
      max-width: 480px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 48px 40px;
      background: #FBF9F3;
      position: relative;
    }
    @media (max-width: 767px) {
      .login-form-panel {
        max-width: 100%;
        padding: 40px 24px;
        min-height: 100vh;
        /* image as subtle background on mobile */
        background-image: var(--bg-image);
        background-size: cover;
        background-position: center;
      }
      .login-form-panel::before {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(216,210,210,0.92);
      }
      .login-form-panel > * { position: relative; z-index: 1; }
    }

    .login-form-box {
      width: 100%;
      max-width: 360px;
    }

    .form-input {
      width: 100%;
      border: 1px solid #D8D2D2;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: white;
      color: #2E2E2E;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-input:focus {
      border-color: #B17457;
      box-shadow: 0 0 0 3px rgba(177,116,87,0.12);
    }
    .form-input::placeholder { color: #b0a9a9; }

    .btn-login {
      width: 100%;
      background: #2E2E2E;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 14px;
      font-weight: 500;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #B17457; }
  </style>
</head>
<body>

<div class="login-wrap">

  <!-- ── Left: cycling image ── -->
  <div class="login-image-panel">
    <img src="{{ root_path }}/static/img/login_web/{{ image }}" alt="Kaayu Studio" />
    <div class="image-tagline">
      <div class="tag-main">Form meets flow.<br>Craft meets intention.</div>
      <div class="tag-sub">Kaayu Studio LLP</div>
    </div>
  </div>

  <!-- ── Right: login form ── -->
  <div class="login-form-panel" style="--bg-image: url('{{ root_path }}/static/img/login_web/{{ image }}')">

    <div class="login-form-box">

      <!-- Logo -->
      <div style="text-align:center;margin-bottom:40px;">
        <img src="{{ root_path }}/static/img/logo.png" alt="Kaayu"
             style="width:180px;height:auto;display:inline-block;" />
        <div style="color:#b0a9a9;font-size:10.5px;letter-spacing:0.22em;text-transform:uppercase;margin-top:10px;font-weight:300;">
          Studio Manager
        </div>
      </div>

      <!-- Heading -->
      <div style="margin-bottom:28px;">
        <h1 style="font-size:20px;font-weight:500;color:#2E2E2E;margin:0 0 6px;">Welcome back</h1>
        <p style="font-size:13px;color:#b0a9a9;margin:0;">Sign in to your account to continue.</p>
      </div>

      <!-- Error -->
      {% if error %}
      <div style="background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:20px;display:flex;align-items:center;gap:8px;">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <!-- Form -->
      <form method="post" action="{{ root_path }}/login">
        <div style="margin-bottom:16px;">
          <label style="display:block;font-size:12px;font-weight:500;color:#2E2E2E;margin-bottom:6px;letter-spacing:0.04em;">USERNAME</label>
          <input type="text" name="username" required autofocus
                 class="form-input" placeholder="your.username" autocomplete="username" />
        </div>

        <div style="margin-bottom:28px;">
          <label style="display:block;font-size:12px;font-weight:500;color:#2E2E2E;margin-bottom:6px;letter-spacing:0.04em;">PASSWORD</label>
          <input type="password" name="password" required
                 class="form-input" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <button type="submit" class="btn-login">SIGN IN</button>
      </form>

      <!-- Footer -->
      <p style="text-align:center;font-size:11px;color:#D8D2D2;margin-top:32px;letter-spacing:0.06em;">
        KAAYU STUDIO LLP &mdash; INTERNAL TOOL
      </p>

    </div>
  </div>

</div>

</body>
</html>
