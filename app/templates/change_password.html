{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
  <h1 class="text-xl font-bold text-gray-900 mb-1">Change Password</h1>
  <p class="text-sm text-gray-500 mb-6">Update your account password.</p>

  {% if success %}
  <div class="bg-green-50 border border-green-200 text-green-700 rounded px-4 py-3 text-sm mb-5">{{ success }}</div>
  {% endif %}

  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 rounded px-4 py-3 text-sm mb-5">{{ error }}</div>
  {% endif %}

  <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-6">
    <form method="post" action="{{ root_path }}/change-password" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Current Password</label>
        <input type="password" name="current_password" required autofocus
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">New Password</label>
        <input type="password" name="new_password" required minlength="6"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        <p class="text-xs text-gray-400 mt-1">Minimum 6 characters.</p>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Confirm New Password</label>
        <input type="password" name="new_password2" required minlength="6"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div class="flex gap-3 pt-1">
        <button type="submit"
          class="bg-indigo-600 text-white px-5 py-2 rounded text-sm hover:bg-indigo-700 transition font-medium">
          Update Password
        </button>
        <a href="{{ root_path }}/" class="text-sm text-gray-500 hover:text-gray-700 px-3 py-2">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
